<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThreatLens</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container text-center mt-5">

    <h1 class="display-3 fw-bold">
        ThreatLens
    </h1>

    <p class="lead mb-5">
        Threat Intelligence Automation Platform
    </p>

    <form>

        <div class="input-group input-group-lg">

            <input
                type="text"
                class="form-control"
                placeholder="Enter Domain or IP Address">

            <button
                class="btn btn-primary"
                type="submit">
                Analyze
            </button>

        </div>

    </form>

    <div class="mt-5">

        <span class="badge bg-primary">WHOIS</span>
        <span class="badge bg-success">DNS</span>
        <span class="badge bg-warning text-dark">SSL</span>
        <span class="badge bg-danger">Threat Intelligence</span>

    </div>

</div>

</body>
</html>
